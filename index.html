<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'Quest - Microsoft Windows 2000 Edition</title>
    <!-- Tailwind CDN (minimal usage) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Win2k CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase config helper -->
    <script src="js/config.js"></script>
    <!-- Supabase for realtime live-quiz rooms -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.3/dist/umd/supabase.js"></script>
</head>
<body style="padding-bottom: 32px;">

    <!-- DESKTOP WALLPAPER (teal background) is applied via body::before in CSS -->

    <!-- MAIN CONTAINER (acts like desktop) -->
    <div id="desktop-layer" class="relative min-h-screen overflow-x-hidden" style="padding: 20px;">

        <!-- ============================================= -->
        <!-- LANDING SECTION (centered window with search) -->
        <!-- ============================================= -->
        <section id="landing-section" class="flex items-center justify-center min-h-screen absolute inset-0 pointer-events-auto" style="transition: opacity 0.7s ease;">
            <div id="landing-content" class="w-full max-w-lg">
                <!-- MAIN WINDOW -->
                <div class="win-window">
                    <!-- Title bar -->
                    <div class="win-titlebar">
                        <div class="win-titlebar-text">
                            <span class="win-titlebar-icon">📝</span>
                            <span id="landing-title" class="kbc-title" style="color: #ffffff; font-size: 13px;">D'Quest</span>
                        </div>
                        <div class="win-ctrl-btns">
                            <div class="win-ctrl-btn">_</div>
                            <div class="win-ctrl-btn">□</div>
                            <div class="win-ctrl-btn">✕</div>
                        </div>
                    </div>

                    <!-- Window body -->
                    <div class="win-window-body">
                        <!-- Branding / subtitle -->
                        <div id="branding" class="text-center mb-4" style="transition: all 0.7s ease;">
                            <p id="landing-subtitle" class="text-xs text-slate-700 flex items-center justify-center gap-1" style="transition: opacity 0.5s;">
                                <i data-lucide="sparkles" class="w-3 h-3"></i>
                                Powered by D&apos;Ai
                            </p>
                        </div>

                        <!-- Search container -->
                        <div id="main-search-container" class="search-container mb-3" style="transition: all 0.7s;">
                            <label class="text-xs font-bold mb-1 block" style="color: #000000;">Address:</label>
                            <div class="flex items-center gap-2">
                                <div class="flex-1 flex items-center gap-2 win-input" style="padding: 2px 4px;">
                                    <i data-lucide="search" class="w-3 h-3 text-slate-600 flex-shrink-0"></i>
                                    <input 
                                        type="text" 
                                        id="main-search"
                                        class="flex-1 bg-transparent border-none outline-none text-xs"
                                        placeholder="Search for Anything"
                                        autocomplete="off"
                                        style="font-family: Tahoma, Verdana, Arial, sans-serif; font-size: 11px; color: #000;"
                                    >
                                </div>
                                <button id="search-btn" class="win-btn-primary win-btn" style="font-weight: bold; padding: 2px 16px; font-size: 11px;">Go</button>
                            </div>
                        </div>

                        <!-- Live Quiz Action -->
                        <div class="text-center mt-3">
                            <button id="join-live-btn" class="win-btn" style="gap: 4px; font-size: 11px;">
                                <i data-lucide="users" class="w-3 h-3"></i>
                                Join Live Quiz
                            </button>
                        </div>
                    </div>

                    <!-- Status bar -->
                    <div class="win-statusbar">
                        <span class="win-status-panel" style="flex: 1; border: none; min-width: 0;">Ready</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- ========================================= -->
        <!-- HEADER (top-left brand + header search) -->
        <!-- ========================================= -->
        <!-- Top-left D'Quest brand (hidden initially, shown after search) -->
        <div id="header-brand" class="fixed top-0 left-0 z-50 px-3 py-2 opacity-0 pointer-events-none" style="transition: all 0.7s; transform: translateX(-30px);">
            <h1 class="text-sm font-bold kbc-title" style="color: #000080; letter-spacing: 1px;">D'Quest</h1>
        </div>

        <!-- Header search bar (hidden initially, center search animates here) -->
        <div id="header-search-bar" class="fixed top-0 left-0 right-0 z-40 opacity-0 pointer-events-none" style="transition: all 0.7s; transform: translateY(-20px);">
            <div class="max-w-2xl mx-auto px-3 py-2" style="padding-left: 100px;">
                <div class="win-window" style="box-shadow: 1px 1px 0 rgba(0,0,0,0.4);">
                    <div class="win-titlebar" style="padding: 2px 4px; font-size: 10px;">
                        <span class="win-titlebar-icon">🔍</span>
                        <span>Search</span>
                        <div class="win-ctrl-btns">
                            <div class="win-ctrl-btn" style="width: 14px; height: 12px; font-size: 8px;">_</div>
                            <div class="win-ctrl-btn" style="width: 14px; height: 12px; font-size: 8px;">□</div>
                            <div class="win-ctrl-btn" style="width: 14px; height: 12px; font-size: 8px;">✕</div>
                        </div>
                    </div>
                    <div style="padding: 3px; background: var(--win-silver); display: flex; align-items: center; gap: 4px;">
                        <i data-lucide="search" class="w-3 h-3 text-slate-600 flex-shrink-0"></i>
                        <input type="text" id="header-search-input" class="win-input flex-1 text-xs" placeholder="Search..." autocomplete="off" style="padding: 1px 4px; font-size: 10px;">
                        <button id="header-search-btn" class="win-btn-primary win-btn" style="padding: 1px 10px; font-size: 10px; min-width: 40px;">Go</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================================================= -->
        <!-- SKELETON CARD SECTION (shows during AI generation) -->
        <!-- ================================================= -->
        <section id="skeleton-card-section" class="hidden px-3 transition-all duration-700" style="padding-top: 4rem;">
            <div class="max-w-6xl mx-auto">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Skeleton Card -->
                    <div id="skeleton-card" class="quiz-card-new relative overflow-hidden">
                        <!-- Card Title Bar -->
                        <div class="card-titlebar">
                            <span class="win-titlebar-icon">📁</span>
                            <span class="text-xs">Quiz.exe</span>
                            <div class="ml-auto win-ctrl-btns">
                                <div class="win-ctrl-btn" style="width: 14px; height: 12px; font-size: 8px;">_</div>
                                <div class="win-ctrl-btn" style="width: 14px; height: 12px; font-size: 8px;">□</div>
                                <div class="win-ctrl-btn" style="width: 14px; height: 12px; font-size: 8px;">✕</div>
                            </div>
                        </div>

                        <!-- Card Body -->
                        <div class="card-body">
                            <!-- Emoji + Title row -->
                            <div class="flex items-start gap-3 mb-2">
                                <div id="skel-emoji" class="w-12 h-12 flex-shrink-0 flex items-center justify-center skeleton-text" style="font-size: 32px; background: #e0dcd4;">&nbsp;</div>
                                <div class="flex-1 min-w-0">
                                    <div id="skel-title" class="skeleton-text font-bold mb-1" style="height: 14px; width: 80%; border-radius: 0;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div>
                                    <div id="skel-topic" class="skeleton-text text-xs" style="height: 10px; width: 50%; border-radius: 0; margin-top: 4px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div>
                                </div>
                            </div>

                            <!-- Metadata grid -->
                            <div class="grid grid-cols-3 gap-2 mb-3 text-xs">
                                <div class="quiz-meta-cell">
                                    <div class="meta-label">Grade</div>
                                    <div id="skel-grade" class="meta-value skeleton-text" style="height: 12px;">&nbsp;&nbsp;&nbsp;</div>
                                </div>
                                <div class="quiz-meta-cell">
                                    <div class="meta-label">Difficulty</div>
                                    <div id="skel-diff" class="meta-value skeleton-text" style="height: 12px;">&nbsp;&nbsp;&nbsp;</div>
                                </div>
                                <div class="quiz-meta-cell">
                                    <div class="meta-label">Questions</div>
                                    <div id="skel-count" class="meta-value skeleton-text" style="height: 12px;">&nbsp;&nbsp;&nbsp;</div>
                                </div>
                            </div>

                            <!-- Progress bar (loading spinner) -->
                            <div class="win-progress-bar mb-3">
                                <div class="win-progress-fill" style="width: 60%;"></div>
                            </div>

                            <!-- Action buttons -->
                            <div class="flex flex-wrap gap-2 mt-auto">
                                <button id="skel-play-btn" class="kbc-button flex-1 opacity-80 cursor-default" style="gap: 4px; font-size: 10px; padding: 3px 8px;">
                                    <div class="spin-loader"></div>
                                    <span style="font-size: 10px;">Generating...</span>
                                </button>
                                <button id="skel-live-btn" class="win-btn opacity-50 cursor-default flex-1" style="gap: 4px; font-size: 10px; padding: 3px 8px;">
                                    <i data-lucide="broadcast" class="w-3 h-3"></i>
                                    <span style="font-size: 10px;">Live</span>
                                </button>
                                <button id="skel-preview-btn" class="win-btn opacity-50 cursor-default" style="padding: 3px 8px; min-width: 32px;">
                                    <i data-lucide="eye" class="w-3 h-3"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ================================================= -->
        <!-- RESULTS SECTION (hidden initially) -->
        <!-- ================================================= -->
        <section id="results-section" class="hidden px-3 py-6 transition-all duration-700" style="padding-top: 4rem;">
            <div class="max-w-6xl mx-auto">
                <!-- Back to Search -->
                <button id="back-btn" class="mb-4 win-btn" style="gap: 4px; font-size: 11px;">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i>
                    <span>New Search</span>
                </button>

                <!-- Results Grid -->
                <div id="quiz-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Quiz cards will be inserted here by app.js -->
                </div>
            </div>
        </section>

    </div>

    <!-- ========================================= -->
    <!-- TASKBAR (bottom of screen, always visible) -->
    <!-- ========================================= -->
    <div id="win-taskbar">
        <!-- Start button -->
        <div id="win-taskbar-start">
            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16'><rect fill='%23c00' width='8' height='8'/><rect fill='%2300c' x='8' width='8' height='8'/><rect fill='%230c0' y='8' width='8' height='8'/><rect fill='%23cc0' x='8' y='8' width='8' height='8'/></svg>" width="16" height="16" alt="Start" style="filter: brightness(0.9);">
            <span style="letter-spacing: 0.5px;">Start</span>
        </div>

        <div class="taskbar-divider"></div>

        <!-- Current task (D'Quest) -->
        <div class="taskbar-task-btn active" style="font-size: 10px;">
            <span>📝</span>
            <span>D&apos;Quest</span>
        </div>

        <!-- Spacer -->
        <div style="flex: 1;"></div>

        <!-- System tray -->
        <div id="win-taskbar-tray">
            <span title="Volume">🔊</span>
            <span title="Network">🖧</span>
            <span id="win-clock">12:00 PM</span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/search.js"></script>
    <script src="js/live.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Initialize Lucide icons
        if (window.lucide) {
            lucide.createIcons();
        }

        // Update taskbar clock
        function updateClock() {
            const now = new Date();
            const hours = now.getHours() % 12 || 12;
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
            const clockEl = document.getElementById('win-clock');
            if (clockEl) clockEl.textContent = `${hours}:${minutes} ${ampm}`;
        }
        updateClock();
        setInterval(updateClock, 60000);
    </script>
</body>
</html>
